version: '3.8'

services:
  app:
    image: ghcr.io/leganets/devops-training:latest
    container_name: devops-app
    restart: unless-stopped
    expose:
      - "5000"
    environment:
      - ENV=production
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:5000/health"]
      interval: 30s
      timeout: 3s
      start_period: 5s
      retries: 3
    networks:
      - app-network

  nginx:
      image: nginx:alpine
      container_name: devops-nginx
      restart: unless-stopped
      ports:
        - "80:80"
      volumes:
        - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      depends_on:
        - app
      networks:
        - app-network

networks:
  app-network:
    driver: bridge
